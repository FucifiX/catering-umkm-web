<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fun Map</title>
    <link rel="icon" href="../assets/img/daunicon.png">
    <link rel="stylesheet" href="map_css/map.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body>
    <div class="map-container">

        <!-- Home button -->
        <div class="home-button">
            <a href="../index.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3l10 9h-3v9h-6v-6h-2v6H5v-9H2l10-9z" />
        </svg> HOME
            </a>
        </div>

        <!-- Notification -->
        <div class="notification">
            Drag on the map to explore,<br> click each pin to find out more!
        </div>

        <!-- Map Content -->
        <div class="map-content">
            <div class="pind" style="top: 22.7%; left: 88.8%;" data-title="KostIBU" data-description="Kostibu Catering telah melayani sejak tahun 1998 dan terus berkomitmen melayani berbagai kebutuhan konsumsi dengan cita rasa lezat dan pelayanan terbaik. Kami telah dipercaya oleh banyak pelanggan, mulai dari acara keluarga hingga kegiatan skala besar, karena selalu mengutamakan kualitas bahan, kebersihan, dan kepuasan pelanggan.">
                <div class="pind-icon">
                    <i class="fas fa-star"></i>
                </div>
            </div>

            <!-- Your pind-popup that will appear above the pind -->
            <div class="pind-popup hidden">
                <div class="pind-popup-content">
                    <h3 id="pind-popup-title"></h3>
                    <p id="pind-popup-description"></p>
                    <button id="pind-popup-close">Close</button>
                </div>
            </div>

            <!-- Kostibooth -->
            <a href="../KostIbooth/kostibooth-start.html" class="camera-pin" style="top: 65%; left: 70%;">
                <div class="camera-icon">
                    <i class="fas fa-camera"></i>
                </div>
            </a>
        </div>

    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
        <button id="zoom-in" aria-label="Zoom In">+</button>
        <button id="zoom-out" aria-label="Zoom Out">-</button>
    </div>

    <!-- Music Button -->
    <div class="music-button">
        <button id="music-toggle" aria-label="Toggle Music">
        🎵 Music
      </button>
    </div>

    <!-- Pin Popup -->
    <div class="pin-popup hidden" role="dialog" aria-modal="true">
        <div class="pin-popup-content">
            <h3 id="popup-title"></h3>
            <p id="popup-description"></p>

            <div class="popup-gallery">
                <button id="popup-prev" aria-label="Previous Image">&larr;</button>

                <img id="popup-image" src="" alt="Gallery Image">
                <button id="popup-next" aria-label="Next Image">&rarr;</button>
            </div>

            <button id="popup-close" aria-label="Close Popup">Close</button>
        </div>

    </div>
    <!-- Description pind -->
    <!-- Your static pind with icon -->



    </div>
    <!-- Legend Bar -->
    <div class="legend-bar">
        <div class="legend-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Location (Gallery KostIBU)</span>
        </div>
        <div class="legend-item">
            <i class="fas fa-star"></i>
            <span>More About KostIBU</span>
        </div>
        <div class="legend-item">
            <i class="fas fa-camera"></i>
            <span>KostIBU Photobooth</span>
        </div>
    </div>

    <div id="preloader">
        <div class="loader-ios">
            <div></div><div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>



    <script src="map_js/map.js"></script>
</body>

</html>
